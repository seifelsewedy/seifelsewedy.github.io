<html lang="en">

    <title>Seif Mohamed | Portfolio 2026</title>

    <style>
        :root {
            --pdf-slate: #243447; /* Matches your PDF background */
            --electric-purple: #8b5cf6;
            --soft-bg: #fdfaf1; /* Creamy white background */
            --text-dark: #1a202c;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--soft-bg);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Hero Header */
        header {
            background-color: var(--pdf-slate);
            color: var(--text-light);
            padding: 100px 20px;
            text-align: center;
            border-bottom: 10px solid var(--electric-purple);
        }

        .profile-img {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 6px solid var(--electric-purple);
            margin-bottom: 25px;
            object-fit: cover;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.5);
        }

        h1 { font-size: 4rem; margin: 0; letter-spacing: -2px; text-transform: uppercase; }
        .tagline { color: var(--electric-purple); font-weight: 800; font-size: 1.5rem; margin-top: 10px; }

        .container { max-width: 1100px; margin: auto; padding: 60px 20px; }

        /* Content Blocks */
        section { margin-bottom: 80px; }
        h2 { font-size: 2.5rem; color: var(--pdf-slate); border-bottom: 4px solid var(--electric-purple); display: inline-block; margin-bottom: 40px; }

        }
