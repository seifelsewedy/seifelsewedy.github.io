<html lang="en">

        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --accent: #2563eb;
            --text-main: #1e293b;

            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        /* Header / Hero */
        header {
            padding: 100px 0;
            text-align: center;
            background: #ffffff;
            border-bottom: 1px solid var(--border);
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 { font-size: 3rem; margin: 10px 0; color: #0f172a; }
        .tagline { color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* Sections */
