<html lang="en">

    <style>
        :root {
            /* Palette inspired by your PDF colors */
            --deep-slate: #2c3e50;
            --muted-teal: #3d5a6c;
            --vibrant-purple: #8b5cf6;
            --cream: #fdfaf1;
            --text-dark: #1a202c;
            --text-light: #edf2f7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--cream);
            color: var(--text-dark);
            margin: 0;
            line-height: 1.6;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        /* Header Section */
        header {
            padding: 100px 0 60px;
            text-align: center;
            background-color: var(--deep-slate);
            color: var(--text-light);
            border-bottom-left-radius: 80px;
            border-bottom-right-radius: 80px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 6px solid var(--vibrant-purple);
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        h1 { font-size: 3.5rem; margin: 0; letter-spacing: -1px; }
        .subtitle { font-size: 1.2rem; color: var(--vibrant-purple); font-weight: bold; text-transform: uppercase; margin-top: 10px; }

        /* General Section Styling */
        section { padding: 60px 0; }
        h2 { font-size: 2.2rem; color: var(--deep-slate); border-bottom: 3px solid var(--vibrant-purple); display: inline-block; margin-bottom: 40px; }

        .card {
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border: 1px solid #eee;
        }
