<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seif Mohamed | Audio & Data Wizard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-purple: #8b5cf6; /* Vibrant Violet */
            --soft-purple: #f5f3ff;
            --dark-purple: #4c1d95;
            --accent-pink: #ec4899;
            --text-main: #1e1b4b;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Inter', sans-serif; /* Playful font stack */
            background-color: var(--soft-purple);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }

        /* Playful Header */
        header {
            padding: 100px 0 60px;
            text-align: center;
            background: linear-gradient(135deg, #ddd6fe 0%, #f5f3ff 100%);
            border-bottom-left-radius: 100px;
            border-bottom-right-radius: 100px;
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.1);
        }

        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 40px; /* Squircle shape */
            border: 5px solid white;
            transform: rotate(-3deg);
            transition: 0.3s;
            object-fit: cover;
            box-shadow: 10px 10px 0px var(--primary-purple);
        }

        .profile-img:hover { transform: rotate(0deg) scale(1.05); }

        h1 { font-size: 3.5rem; margin: 15px 0 5px; color: var(--dark-purple); }
        
        .badge-container { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .badge {
            background: var(--primary-purple);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Sections */
        section { padding: 40px 0; }
        h2 { 
            font-size: 2.2rem; 
            color: var(--dark-purple); 
            display: inline-block;
            position: relative;
        }
        h2::after {
            content: "";
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 100%;
            height: 12px;
            background: rgba(236, 72, 153, 0.2); /* Pink highlight */
            z-index: -1;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }

        .card {
            background: white;
            padding: 30px;
            border-radius: 30px;
            border: 3px solid transparent;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            transition: 0.3s ease;
        }
